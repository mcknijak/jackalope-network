name: portainer

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H tcp://portainer-agent:9001 --tlsskipverify
    volumes:
      - /mnt/data/portainer/data:/data
    networks:
      - proxy
      - portainer-internal

  # Local agent. Portainer talks to the agent (not directly to the Docker
  # socket) so the same install pattern works when a second host is added
  # later: that host just runs an agent and gets pointed at this Portainer.
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer-internal

networks:
  proxy:
    external: true
  portainer-internal:
    driver: bridge
